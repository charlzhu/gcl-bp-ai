<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      显式声明站点图标，避免浏览器回退请求 /favicon.ico 导致固定 404 console error。
      这里使用内联 SVG，减少额外静态资源管理成本，并保持当前前端目录结构不变。
    -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%231f6feb'/%3E%3Ctext x='32' y='41' text-anchor='middle' font-size='30' font-family='Arial, sans-serif' fill='white'%3EG%3C/text%3E%3C/svg%3E"
    />
    <title>协鑫集成经营计划部智能平台</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
